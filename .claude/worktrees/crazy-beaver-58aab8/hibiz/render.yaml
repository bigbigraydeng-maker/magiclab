services:
  - type: web
    name: hibiz
    env: node
    plan: standard

    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start

    envVars:
      - key: OPENAI_API_KEY
      - key: NEXT_PUBLIC_SUPABASE_URL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048
