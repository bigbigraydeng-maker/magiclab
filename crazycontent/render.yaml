services:
  - type: web
    name: crazycontent
    env: node
    plan: standard
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: crazycontent
          property: host

  - type: background
    name: crazycontent-tasks
    env: node
    plan: standard
    buildCommand: npm install
    startCommand: npm run process-tasks
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false

  - type: cron
    name: poll-visual-jobs
    env: node
    schedule: "*/2 * * * *"
    buildCommand: ""
    startCommand: |
      curl -s -H "Authorization: Bearer $CRON_SECRET" \
        https://$RENDER_EXTERNAL_URL/api/cron/poll-visual-jobs
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: crazycontent
          property: host

  - type: cron
    name: sync-airtable
    env: node
    schedule: "0 * * * *"
    buildCommand: ""
    startCommand: |
      curl -s -H "Authorization: Bearer $CRON_SECRET" \
        https://$RENDER_EXTERNAL_URL/api/cron/sync-airtable
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: crazycontent
          property: host
