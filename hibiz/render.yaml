services:
  - type: web
    name: hibiz
    env: node
    plan: standard

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: OPENAI_API_KEY
        scope: build
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: build
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: build
      - key: NODE_ENV
        value: production
