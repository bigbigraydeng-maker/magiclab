services:
  - type: web
    name: crazycontent
    env: node
    plan: standard
    rootDir: crazycontent
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PROCESS_TASKS_SECRET
        sync: false
      - key: ENABLE_REAL_GENERATION
        value: "true"
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: crazycontent
          property: host
