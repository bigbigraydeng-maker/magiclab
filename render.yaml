services:
  - type: web
    name: magiclab
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: MAGIC_ENGINE_TO
        sync: false
